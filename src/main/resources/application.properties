
server.port=${SERVER_PORT:7718}
server.servlet.context-path=/api


# MySQL Database

spring.datasource.url=jdbc:postgresql://localhost:5432/idigibank_db
spring.datasource.username=postgres
spring.datasource.password=Bhartiaj47


# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# JWT
app.jwt.secret=idigiCloudBankSecretKeyMustBeAtLeast256BitsLongForHS256AlgorithmSecurity
app.jwt.expiration-ms=86400000


# CBS Mock Service Base URL (port 7717)
# ============================================
cbs.service.base-url=http://localhost:7717/cbs

# ============================================
# Python KYC Service Base URL (port 5000)
# ============================================
kyc.service.base-url=http://localhost:5000

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# CORS - Allow frontend (Next.js on 3000 and Vercel)
# ============================================
app.cors.allowed-origins=http://localhost:3000,https://idigibank.vercel.app,https://account-opening-frontend.vercel.app

# ============================================
# Logging
# ============================================
logging.level.com.idigicloud=DEBUG
logging.level.org.springframework.security=INFO
