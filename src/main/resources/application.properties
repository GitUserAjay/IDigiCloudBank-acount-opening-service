# ============================================
# Server
# ============================================
server.port=${PORT:8080}
server.servlet.context-path=/api

# ============================================
# PostgreSQL Database (Render)
# ============================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Recommended PostgreSQL Driver
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update

# Turn OFF SQL logs in production
spring.jpa.show-sql=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ============================================
# JWT
# ============================================
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000

# ============================================
# CBS Mock Service
# ============================================
# If CBS service is also deployed on Render
cbs.service.base-url=${CBS_SERVICE_URL}

# Example:
# cbs.service.base-url=https://cbs-service.onrender.com/cbs

# ============================================
# Python KYC Service
# ============================================
# If deployed separately on Render
kyc.service.base-url=${KYC_SERVICE_URL}

# Example:
# kyc.service.base-url=https://kyc-service.onrender.com

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Example:
# app.cors.allowed-origins=https://idigibank.vercel.app,https://account-opening-frontend.vercel.app

# ============================================
# Logging
# ============================================
logging.level.com.idigicloud=INFO
logging.level.org.springframework.security=INFO